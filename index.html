<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Multi-Model Chat</title>
<script src="https://js.puter.com/v2/"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0e0e1a;
    --surface2: #13131f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0fc;
    --glow: rgba(124,92,252,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,92,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(92,240,252,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 60% 30%, rgba(252,92,125,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* === HEADER === */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,16,0.8);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo span { color: var(--accent); }

  /* === MODEL SELECTOR === */
  .model-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .model-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .model-btn:hover {
    border-color: rgba(124,92,252,0.5);
    color: var(--text);
    background: rgba(124,92,252,0.08);
  }

  .model-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,92,252,0.12);
    box-shadow: 0 0 16px rgba(124,92,252,0.2);
  }

  .model-btn .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: currentColor;
    opacity: 0.6;
  }

  /* Provider group labels */
  .provider-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 4px;
  }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }

  /* === CHAT AREA === */
  .chat-wrapper {
    flex: 1;
    overflow-y: auto;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat-wrapper::-webkit-scrollbar { width: 4px; }
  .chat-wrapper::-webkit-scrollbar-track { background: transparent; }
  .chat-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .messages {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 100%;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    gap: 16px;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .empty-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
    opacity: 0.4;
  }

  .empty-sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-1px);
  }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .msg.ai .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--accent);
  }

  .msg-body { max-width: calc(100% - 48px); }

  .msg-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg.user .msg-meta { flex-direction: row-reverse; }

  .model-tag {
    background: rgba(124,92,252,0.15);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 9px;
  }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 12px;
    line-height: 1.7;
    font-size: 14px;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(252,92,125,0.1));
    border: 1px solid rgba(124,92,252,0.2);
    border-radius: 12px 2px 12px 12px;
    text-align: right;
  }

  .msg.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
  }

  .msg.ai .msg-bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .msg.ai .msg-bubble code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: rgba(124,92,252,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent3);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  /* === INPUT AREA === */
  .input-area {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    padding: 16px 24px 20px;
    background: rgba(8,8,16,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: rgba(124,92,252,0.4);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.06);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 22px;
    max-height: 160px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #9170ff; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-footer {
    max-width: 820px;
    margin: 8px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .current-model-indicator {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .current-model-indicator::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .clear-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .clear-btn:hover { color: var(--accent2); background: rgba(252,92,125,0.08); }

  /* Responsive */
  @media (max-width: 640px) {
    .model-bar { gap: 4px; }
    .model-btn { padding: 4px 10px; font-size: 10px; }
    .provider-label, .divider { display: none; }
    .messages { padding: 16px 12px; }
  }

  /* Error state */
  .error-bubble {
    background: rgba(252,92,125,0.08) !important;
    border-color: rgba(252,92,125,0.2) !important;
    color: var(--accent2);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    Nexus<span>AI</span>
  </div>

  <div class="model-bar" id="modelBar">
    <span class="provider-label">Anthropic</span>
    <button class="model-btn active" data-model="claude-sonnet-4-6" data-label="Claude Sonnet 4.6">
      <span class="dot"></span>Sonnet 4.6
    </button>
    <button class="model-btn" data-model="claude-opus-4-6" data-label="Claude Opus 4.6">
      <span class="dot"></span>Opus 4.6
    </button>
    <button class="model-btn" data-model="claude-haiku-4-5" data-label="Claude Haiku 4.5">
      <span class="dot"></span>Haiku 4.5
    </button>

    <div class="divider"></div>
    <span class="provider-label">OpenAI</span>
    <button class="model-btn" data-model="gpt-4o" data-label="GPT-4o">
      <span class="dot"></span>GPT-4o
    </button>
    <button class="model-btn" data-model="gpt-4o-mini" data-label="GPT-4o Mini">
      <span class="dot"></span>4o Mini
    </button>

    <div class="divider"></div>
    <span class="provider-label">Google</span>
    <button class="model-btn" data-model="gemini-2.0-flash" data-label="Gemini 2.0 Flash">
      <span class="dot"></span>Gemini 2.0
    </button>

    <div class="divider"></div>
    <span class="provider-label">Meta</span>
    <button class="model-btn" data-model="meta-llama/llama-3.1-8b-instruct:free" data-label="Llama 3.1 8B">
      <span class="dot"></span>Llama 3.1
    </button>

    <div class="divider"></div>
    <span class="provider-label">DeepSeek</span>
    <button class="model-btn" data-model="deepseek-chat" data-label="DeepSeek V3">
      <span class="dot"></span>DeepSeek V3
    </button>
  </div>
</header>

<div class="chat-wrapper" id="chatWrapper">
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-title">NexusAI</div>
      <div class="empty-sub">Multi-model AI chat · Powered by Puter.js<br>Pilih model di atas, lalu mulai percakapan</div>
      <div class="suggestion-chips">
        <div class="chip" onclick="sendSuggestion('Jelaskan quantum computing dengan sederhana')">⚛️ Quantum Computing</div>
        <div class="chip" onclick="sendSuggestion('Tulis puisi tentang kecerdasan buatan')">✍️ Tulis Puisi</div>
        <div class="chip" onclick="sendSuggestion('Buatkan fungsi Python untuk sorting data')">🐍 Kode Python</div>
        <div class="chip" onclick="sendSuggestion('Apa perbedaan antara AI, ML, dan Deep Learning?')">🤖 Perbedaan AI/ML/DL</div>
        <div class="chip" onclick="sendSuggestion('Rekomendasikan 5 buku terbaik tentang produktivitas')">📚 Rekomendasi Buku</div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <div class="input-box">
      <textarea
        id="inputField"
        placeholder="Kirim pesan ke AI..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="input-footer">
    <div class="current-model-indicator" id="currentModelIndicator">claude-sonnet-4-6</div>
    <button class="clear-btn" onclick="clearChat()">↺ Bersihkan</button>
  </div>
</div>

<script>
let currentModel = 'claude-sonnet-4-6';
let currentModelLabel = 'Claude Sonnet 4.6';
let isLoading = false;
let history = [];

// Model selection
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
    currentModelLabel = btn.dataset.label;
    document.getElementById('currentModelIndicator').textContent = currentModel;
  });
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(text) {
  document.getElementById('inputField').value = text;
  sendMessage();
}

function getModelInitials(model) {
  if (model.includes('claude')) return 'CL';
  if (model.includes('gpt')) return 'OAI';
  if (model.includes('gemini')) return 'GG';
  if (model.includes('llama')) return 'LL';
  if (model.includes('deepseek')) return 'DS';
  if (model.includes('mistral')) return 'MS';
  return 'AI';
}

function appendMessage(role, content, modelName) {
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();

  const messagesEl = document.getElementById('messages');
  const msgEl = document.createElement('div');
  msgEl.className = `msg ${role}`;

  const initials = role === 'user' ? '👤' : getModelInitials(currentModel);
  const timeStr = new Date().toLocaleTimeString('id', {hour:'2-digit', minute:'2-digit'});
  const modelTag = role === 'ai' ? `<span class="model-tag">${modelName}</span>` : '';

  msgEl.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta">${timeStr} ${modelTag}</div>
      <div class="msg-bubble">${formatContent(content)}</div>
    </div>
  `;

  messagesEl.appendChild(msgEl);
  scrollToBottom();
  return msgEl;
}

function formatContent(text) {
  // Basic markdown-like formatting
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const messagesEl = document.getElementById('messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.id = 'typingIndicator';
  typingEl.innerHTML = `
    <div class="msg-avatar">${getModelInitials(currentModel)}</div>
    <div class="msg-body">
      <div class="msg-meta">${currentModelLabel}</div>
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  messagesEl.appendChild(typingEl);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollToBottom() {
  const wrapper = document.getElementById('chatWrapper');
  wrapper.scrollTop = wrapper.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', text, null);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    // Build messages for context
    const messages = history.map(m => `${m.role === 'user' ? 'Human' : 'Assistant'}: ${m.content}`).join('\n');

    const response = await puter.ai.chat(
      history.length > 1
        ? `Previous conversation:\n${history.slice(0,-1).map(m=>`${m.role==='user'?'Human':'Assistant'}: ${m.content}`).join('\n')}\n\nHuman: ${text}`
        : text,
      { model: currentModel, stream: false }
    );

    removeTyping();

    let aiText = '';
    if (response?.message?.content) {
      if (Array.isArray(response.message.content)) {
        aiText = response.message.content.map(c => c.text || '').join('');
      } else {
        aiText = response.message.content;
      }
    } else if (response?.text) {
      aiText = response.text;
    } else if (typeof response === 'string') {
      aiText = response;
    } else {
      aiText = JSON.stringify(response);
    }

    history.push({ role: 'assistant', content: aiText });
    appendMessage('ai', aiText, currentModelLabel);

  } catch (err) {
    removeTyping();
    const messagesEl = document.getElementById('messages');
    const errEl = document.createElement('div');
    errEl.className = 'msg ai';
    errEl.innerHTML = `
      <div class="msg-avatar">⚠</div>
      <div class="msg-body">
        <div class="msg-meta">${currentModelLabel} · Error</div>
        <div class="msg-bubble error-bubble">
          Gagal mendapatkan respons dari model ini.<br>
          <small style="opacity:0.6;font-family:monospace;font-size:11px">${err.message || err}</small>
        </div>
      </div>
    `;
    messagesEl.appendChild(errEl);
    scrollToBottom();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function clearChat() {
  history = [];
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-title">NexusAI</div>
      <div class="empty-sub">Multi-model AI chat · Powered by Puter.js<br>Pilih model di atas, lalu mulai percakapan</div>
      <div class="suggestion-chips">
        <div class="chip" onclick="sendSuggestion('Jelaskan quantum computing dengan sederhana')">⚛️ Quantum Computing</div>
        <div class="chip" onclick="sendSuggestion('Tulis puisi tentang kecerdasan buatan')">✍️ Tulis Puisi</div>
        <div class="chip" onclick="sendSuggestion('Buatkan fungsi Python untuk sorting data')">🐍 Kode Python</div>
        <div class="chip" onclick="sendSuggestion('Apa perbedaan antara AI, ML, dan Deep Learning?')">🤖 Perbedaan AI/ML/DL</div>
        <div class="chip" onclick="sendSuggestion('Rekomendasikan 5 buku terbaik tentang produktivitas')">📚 Rekomendasi Buku</div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
